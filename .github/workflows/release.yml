name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Delete existing release
        run: gh release delete ${{ steps.version.outputs.version }} --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release
        run: gh release create ${{ steps.version.outputs.version }} main.js manifest.json --title "${{ steps.version.outputs.version }}" --notes "Auto-release from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
