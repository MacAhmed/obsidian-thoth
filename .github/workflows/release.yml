name: Release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Bump patch version
        run: |
          node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('manifest.json'));
          const p = JSON.parse(fs.readFileSync('package.json'));
          const parts = m.version.split('.');
          parts[2] = parseInt(parts[2]) + 1;
          const v = parts.join('.');
          m.version = v;
          p.version = v;
          fs.writeFileSync('manifest.json', JSON.stringify(m, null, 2) + '\n');
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          console.log('Bumped to ' + v);
          "

      - run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./manifest.json').version")" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifest.json package.json main.js
          git commit -m "[skip ci] release ${{ steps.version.outputs.version }}"
          git push

      - name: Create release
        run: gh release create ${{ steps.version.outputs.version }} main.js manifest.json --title "${{ steps.version.outputs.version }}" --notes "Auto-release from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
